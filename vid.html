<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Build & Interior Gallery</title>
<style>
  :root{
    --bg:#FFF7F1;
    --bg-soft:#FFFDFB;
    --accent:#ED6A2C;
    --accent-dark:#D65A1F;
    --navy:#172233;
    --navy-soft:#4B5567;
    --gray:#6C7686;
    --border:#ECE1D6;
    --radius-lg:20px;
    --radius-md:14px;
    --gap:16px;
    --row:190px;
    --ink:#172233;
    --ink-soft:#4B5567;
    --paper:#FFFDFB;
    --brass:#ED6A2C;
    --brass-dark:#D65A1F;
    --brass-light:#ED6A2C;
    --line:#ECE1D6;
    --maxw:1280px;
    --shadow-sm:0 2px 10px rgba(23,34,51,.06);
    --shadow-md:0 14px 36px rgba(23,34,51,.10);
    --display:'Inter',sans-serif;
    --ease:cubic-bezier(.22,.9,.3,1);
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Inter',Arial,sans-serif;background:var(--bg-soft);color:var(--navy);min-height:100vh;}
  h1,h2,h3{font-family:'Poppins','Inter',sans-serif;}
  button{font-family:inherit;cursor:pointer;}
  img,video{display:block;max-width:100%;}

  /* Header */
  .gallery-header{text-align:center;padding:48px 16px 28px;}
  .gallery-header h1{
    font-size:clamp(26px,4vw,38px);font-weight:800;
    background:linear-gradient(90deg,#172233,#4B5567,#172233);
    -webkit-background-clip:text;-webkit-text-fill-color:transparent;
    background-clip:text;
  }
  .gallery-header p{
    margin-top:10px;color:var(--gray);font-size:15px;
    max-width:560px;margin-left:auto;margin-right:auto;line-height:1.6;
  }

  /* Bento Grid — dense auto-flow prevents holes when items are removed/reordered non-sequentially */
  .bento-grid{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    grid-auto-rows:var(--row);
    grid-auto-flow:dense;
    gap:var(--gap);
    padding:0 24px 140px;
    max-width:1280px;
    margin:0 auto;
  }
  @media(max-width:1024px){
    .bento-grid{grid-template-columns:repeat(3,1fr);--row:170px;}
  }
  @media(max-width:768px){
    .bento-grid{grid-template-columns:repeat(2,1fr);--row:150px;padding:0 16px 140px;gap:12px;}
  }
  @media(max-width:480px){
    .bento-grid{grid-template-columns:repeat(2,1fr);--row:130px;padding:0 12px 140px;gap:10px;}
  }

  .bento-item{
    position:relative;
    overflow:hidden;
    border-radius:16px;
    background:#ddd;
    cursor:grab;
    user-select:none;
    touch-action:none;
    transition:transform .25s ease,box-shadow .25s ease;
    box-shadow:0 6px 20px rgba(23,34,51,.08);
    width:100%;
    height:100%;
  }
  .bento-item:hover{transform:scale(1.02);box-shadow:0 12px 30px rgba(23,34,51,.14);z-index:2;}
  .bento-item.dragging{opacity:.35;cursor:grabbing;}
  .bento-item.drop-target{outline:3px solid var(--accent);outline-offset:-3px;}

  .bento-item .media-wrap{position:absolute;inset:0;}
  .bento-item .media-wrap img,.bento-item .media-wrap video{width:100%;height:100%;object-fit:cover;}

  .bento-item .item-info{
    position:absolute;inset:0;
    display:flex;flex-direction:column;justify-content:flex-end;
    padding:14px;
    background:linear-gradient(180deg,rgba(0,0,0,0) 40%,rgba(0,0,0,.72) 100%);
    opacity:0;
    transition:opacity .25s ease;
    pointer-events:none;
  }
  .bento-item:hover .item-info{opacity:1;}
  .bento-item .item-info h3{color:#fff;font-size:14px;font-weight:600;line-height:1.3;}
  .bento-item .item-info p{color:rgba(255,255,255,.75);font-size:12px;margin-top:4px;line-height:1.4;}
  .bento-item .tag{
    position:absolute;top:10px;left:10px;
    background:rgba(23,34,51,.55);
    color:#fff;font-size:10px;font-weight:600;letter-spacing:.04em;
    text-transform:uppercase;
    padding:4px 9px;border-radius:20px;
    backdrop-filter:blur(4px);
  }

  .bento-item.enter{animation:bentoIn .5s cubic-bezier(.22,.9,.3,1) both;}
  @keyframes bentoIn{
    from{opacity:0;transform:translateY(24px) scale(.96);}
    to{opacity:1;transform:none;}
  }

  /* Spans */
  .span-1-1{grid-column:span 1;grid-row:span 1;}
  .span-1-2{grid-column:span 1;grid-row:span 2;}
  .span-2-1{grid-column:span 2;grid-row:span 1;}
  .span-2-2{grid-column:span 2;grid-row:span 2;}

  @media(max-width:768px){
    .span-1-2{grid-row:span 2;}
    .span-2-2{grid-row:span 2;}
    .span-2-1{grid-column:span 2;grid-row:span 1;}
    .span-1-1{grid-column:span 1;grid-row:span 1;}
  }
  @media(max-width:480px){
    .span-1-2,.span-2-2,.span-2-1,.span-1-1{grid-column:span 1;grid-row:span 1;}
  }

  /* Modal */
  .modal-backdrop{
    position:fixed;inset:0;
    background:rgba(23,34,51,.75);
    backdrop-filter:blur(8px);
    -webkit-backdrop-filter:blur(8px);
    z-index:100;
    display:flex;align-items:center;justify-content:center;
    padding:20px;
    opacity:0;pointer-events:none;
    transition:opacity .25s ease;
  }
  .modal-backdrop.open{opacity:1;pointer-events:auto;}
  .modal-content{
    position:relative;
    width:100%;max-width:900px;
    background:rgba(255,253,251,.95);
    backdrop-filter:blur(12px);
    -webkit-backdrop-filter:blur(12px);
    border-radius:20px;
    overflow:hidden;
    box-shadow:0 30px 60px rgba(0,0,0,.25);
    transform:scale(.97);
    transition:transform .3s cubic-bezier(.22,.9,.3,1);
  }
  .modal-backdrop.open .modal-content{transform:scale(1);}
  .modal-media{
    position:relative;
    width:100%;aspect-ratio:16/9;
    background:#000;
    display:flex;align-items:center;justify-content:center;
  }
  .modal-media img,.modal-media video{width:100%;height:100%;object-fit:contain;}
  .modal-caption{
    position:absolute;bottom:0;left:0;right:0;
    padding:24px;
    background:linear-gradient(180deg,rgba(0,0,0,0) 0%,rgba(0,0,0,.6) 100%);
    color:#fff;
    pointer-events:none;
  }
  .modal-caption h3{font-size:18px;font-weight:700;}
  .modal-caption p{font-size:13px;color:rgba(255,255,255,.8);margin-top:4px;}
  .modal-close{
    position:absolute;top:12px;right:12px;
    width:36px;height:36px;border-radius:50%;
    background:rgba(255,255,255,.9);
    border:none;
    display:flex;align-items:center;justify-content:center;
    font-size:18px;color:var(--navy);
    box-shadow:0 4px 12px rgba(0,0,0,.15);
    transition:transform .2s ease,background .2s ease;
    z-index:5;
  }
  .modal-close:hover{transform:scale(1.1);background:#fff;}

  /* Dock */
  .dock{
    position:fixed;z-index:200;
    bottom:20px;left:50%;transform:translateX(-50%);
    max-width:94vw;
    display:flex;justify-content:center;
  }
  .dock-inner{
    display:flex;align-items:center;
    gap:10px;
    padding:8px 14px;
    background:rgba(23,34,51,.55);
    backdrop-filter:blur(14px);
    -webkit-backdrop-filter:blur(14px);
    border:1px solid rgba(255,255,255,.18);
    border-radius:20px;
    box-shadow:0 10px 30px rgba(0,0,0,.2);
    overflow-x:auto;
    max-width:100%;
    scrollbar-width:none;
  }
  .dock-inner::-webkit-scrollbar{display:none;}
  .dock-item{
    width:44px;height:44px;
    border-radius:12px;
    overflow:hidden;
    flex-shrink:0;
    cursor:pointer;
    border:2px solid transparent;
    transition:transform .2s ease,border-color .2s ease;
    position:relative;
  }
  .dock-item img,.dock-item video{width:100%;height:100%;object-fit:cover;}
  .dock-item.active{border-color:var(--accent);transform:translateY(-6px) scale(1.1);box-shadow:0 6px 16px rgba(0,0,0,.3);}
  .dock-item:not(.active):hover{transform:translateY(-4px) scale(1.05);}
  .dock-item .dock-overlay{
    position:absolute;inset:0;
    background:linear-gradient(180deg,transparent 50%,rgba(0,0,0,.2) 100%);
    pointer-events:none;
  }

  .drag-ghost{
    position:fixed;z-index:50;pointer-events:none;
    opacity:.9;
    border-radius:16px;
    overflow:hidden;
    box-shadow:0 20px 40px rgba(0,0,0,.35);
  }
  .drag-ghost img,.drag-ghost video{width:100%;height:100%;object-fit:cover;}

  .hint{
    text-align:center;color:var(--gray);font-size:12.5px;
    margin:-6px auto 24px;
  }

  /* ============ NAVBAR ============ */
  .nav{
    position:sticky;top:0;z-index:100;
    border-bottom:1px solid transparent;
    transition:background .4s var(--ease), border-color .4s var(--ease), box-shadow .4s var(--ease);
  }
  .nav.is-scrolled{
    background:rgba(250,250,246,.78);
    backdrop-filter:blur(16px) saturate(140%);
    -webkit-backdrop-filter:blur(16px) saturate(140%);
    border-color:var(--line);
    box-shadow:0 8px 30px rgba(21,20,15,.05);
  }
  .nav-inner{
    max-width:var(--maxw);margin:0 auto;padding:22px 48px;
    display:flex;align-items:center;justify-content:space-between;gap:32px;
  }
  .logo{
    display:flex;align-items:center;
  }
  .logo img{height:36px;width:auto;}
  .nav-links{display:flex;align-items:center;gap:38px;}
  .nav-links a{
    font-size:14px;font-weight:500;color:var(--ink-soft);
    position:relative;padding:6px 0;
    transition:color .3s var(--ease);
  }
  .nav-links a::after{
    content:'';position:absolute;left:0;bottom:0;height:1px;width:0;
    background:var(--brass);transition:width .35s var(--ease);
  }
  .nav-links a:hover{color:var(--ink);}
  .nav-links a:hover::after,.nav-links a.active::after{width:100%;}
  .nav-links a.active{color:var(--ink);}
  .nav-cta{
    display:flex;align-items:center;gap:18px;
  }
  .btn{
    display:inline-flex;align-items:center;gap:8px;
    padding:13px 24px;border-radius:100px;
    font-size:13.5px;font-weight:600;letter-spacing:.01em;
    transition:transform .35s var(--ease), box-shadow .35s var(--ease), background .35s var(--ease);
  }
  .btn-primary{
    background:var(--ink);color:var(--paper);
    box-shadow:var(--shadow-sm);
  }
  .btn-primary:hover{transform:translateY(-2px);box-shadow:var(--shadow-md);background:#231F16;}
  .nav-toggle{display:none;flex-direction:column;gap:5px;width:24px;}
  .nav-toggle span{height:2px;background:var(--ink);border-radius:2px;transition:transform .3s var(--ease), opacity .3s var(--ease);}

  @media(max-width:900px){
    .nav-cta{display:none;}
    .nav-links{display:none;}
    .nav-toggle{display:flex;}
    .nav-links.open{display:flex;flex-direction:column;position:absolute;top:100%;left:0;right:0;background:var(--paper);padding:24px 48px;border-bottom:1px solid var(--line);gap:20px;}
  }
  @media(max-width:600px){
    .nav-inner{padding-left:22px;padding-right:22px;}
    .nav-links.open{padding-left:22px;padding-right:22px;}
  }
</style>
</head>
<body>

<header class="nav" id="nav">
  <div class="nav-inner">
    <a href="index.html" class="logo"><img src="logo.png" alt="VINS Construction"></a>
    <nav class="nav-links">
      <a href="index.html">Home</a>
      <a href="about.html">About</a>
      <a href="service.html">Services</a>
      <a href="project.html">Projects</a>
      <a href="contact.html">Contact</a>
    </nav>
    <div class="nav-cta">
      <a href="contact.html" class="btn btn-primary">Start a project →</a>
    </div>
    <button class="nav-toggle" id="navToggle" aria-label="Toggle menu">
      <span></span><span></span><span></span>
    </button>
  </div>
</header>

<div class="gallery-header">
  <h1>Build &amp; Interior Gallery</h1>
  <p>Construction progress and home interior shots — drag any tile to reorder, click to view full size</p>
</div>
<p class="hint">Tip: press and hold a tile, then drag it over another to swap places</p>

<div class="bento-grid" id="bentoGrid"></div>

<div class="modal-backdrop" id="galleryModal">
  <div class="modal-content">
    <button class="modal-close" id="modalClose">&times;</button>
    <div class="modal-media" id="modalMedia"></div>
    <div class="modal-caption" id="modalCaption"></div>
  </div>
</div>

<div class="dock" id="dock">
  <div class="dock-inner" id="dockInner"></div>
</div>

<script>
// Media limited to construction work + home interior only (content as provided)
const mediaItems = [
  {id:0,type:"video",tag:"Video Tour",title:"Full Property Walkthrough",desc:"Complete video tour of the property",url:"https://videotourl.com/videos/1783937584870-a469ebde-be04-4a8f-9479-50435a35f945.mp4",span:"span-2-2"},
  {id:1,type:"image",tag:"Exterior",title:"Modern Exterior",desc:"Sleek modern home facade",url:"https://images.unsplash.com/photo-1600596542815-ffad4c1539a9?w=800&q=80",span:"span-1-2"},
  {id:3,type:"image",tag:"Interior",title:"Cozy Bedroom",desc:"Warm inviting bedroom design",url:"https://images.unsplash.com/photo-1616594039964-ae9021a400a0?w=800&q=80",span:"span-1-2"},
  {id:4,type:"image",tag:"Interior",title:"Kitchen Design",desc:"Modern kitchen interior",url:"https://images.unsplash.com/photo-1556911220-e15b29be8c8f?w=800&q=80",span:"span-2-1"},
  {id:6,type:"image",tag:"Interior",title:"Minimalist Hallway",desc:"Clean hallway design",url:"https://images.unsplash.com/photo-1502005229762-cf1b2da7c5d6?w=800&q=80",span:"span-2-1"},
  {id:8,type:"image",tag:"Interior",title:"Luxury Bathroom",desc:"Elegant bathroom with tub",url:"https://images.unsplash.com/photo-1552321554-5fefe8c9ef14?w=800&q=80",span:"span-1-1"},
  {id:9,type:"image",tag:"Exterior",title:"Home Exterior",desc:"Beautiful house facade",url:"https://images.unsplash.com/photo-1600585154340-be6161a56a0c?w=800&q=80",span:"span-2-2"},
  {id:10,type:"image",tag:"Interior",title:"Dining Room",desc:"Elegant dining space",url:"https://images.unsplash.com/photo-1600210492486-724fe5c67fb0?w=800&q=80",span:"span-1-1"},
  {id:12,type:"image",tag:"Interior",title:"Bedroom Suite",desc:"Master bedroom design",url:"https://images.unsplash.com/photo-1618221195710-dd6b41faaea6?w=800&q=80",span:"span-1-2"},
  {id:13,type:"image",tag:"Exterior",title:"Outdoor Deck",desc:"Spacious wooden deck build",url:"https://images.unsplash.com/photo-1600566753190-17f0baa2a6c3?w=800&q=80",span:"span-2-1"},
  {id:14,type:"image",tag:"Interior",title:"Modern Staircase",desc:"Contemporary stair design",url:"https://images.unsplash.com/photo-1600573472550-8090b5e0745e?w=800&q=80",span:"span-1-1"},
  {id:16,type:"image",tag:"Exterior",title:"Pool Area",desc:"Infinity pool view",url:"https://images.unsplash.com/photo-1600585154526-990dced4db0d?w=800&q=80",span:"span-2-2"},
  {id:25,type:"image",tag:"Interior",title:"Closet Organization",desc:"Walk-in closet design",url:"https://images.unsplash.com/photo-1595428774223-ef526241e22e?w=800&q=80",span:"span-1-1"},
  {id:28,type:"image",tag:"Exterior",title:"Balcony View",desc:"City view balcony",url:"https://images.unsplash.com/photo-1600573472592-401b489a3cdc?w=800&q=80",span:"span-1-1"},
];

let items = [...mediaItems];
let selectedItem = null;
let dragIndex = null;
let dragStartPos = {x:0,y:0};
let isDragging = false;
let currentDropIndex = null;

const grid = document.getElementById('bentoGrid');
const modal = document.getElementById('galleryModal');
const modalMedia = document.getElementById('modalMedia');
const modalCaption = document.getElementById('modalCaption');
const modalClose = document.getElementById('modalClose');
const dockInner = document.getElementById('dockInner');

function createBentoItem(item, index){
  const el = document.createElement('div');
  el.className = `bento-item ${item.span} enter`;
  el.style.animationDelay = `${index * 0.05}s`;
  el.dataset.id = item.id;
  el.dataset.index = index;

  const mediaHTML = item.type === 'video'
    ? `<video src="${item.url}" muted loop playsinline preload="metadata"></video>`
    : `<img src="${item.url}" alt="${item.title}" loading="lazy">`;

  el.innerHTML = `
    <div class="media-wrap">${mediaHTML}</div>
    <span class="tag">${item.tag}</span>
    <div class="item-info">
      <h3>${item.title}</h3>
      <p>${item.desc}</p>
    </div>
  `;

  el.addEventListener('click', () => { if(!isDragging) openModal(item); });
  el.addEventListener('mousedown', (e) => startDrag(e, index, el));
  el.addEventListener('touchstart', (e) => startDrag(e, index, el), {passive:false});

  return el;
}

function renderGrid(){
  grid.innerHTML = '';
  items.forEach((item, i) => grid.appendChild(createBentoItem(item, i)));
  renderDock();
  setTimeout(observeVideos, 50);
}

function renderDock(){
  dockInner.innerHTML = '';
  items.forEach((item) => {
    const dockItem = document.createElement('div');
    dockItem.className = `dock-item ${selectedItem && selectedItem.id === item.id ? 'active' : ''}`;
    dockItem.innerHTML = item.type === 'video'
      ? `<video src="${item.url}" muted loop playsinline></video><div class="dock-overlay"></div>`
      : `<img src="${item.url}" alt="${item.title}"><div class="dock-overlay"></div>`;
    dockItem.addEventListener('click', () => { selectedItem = item; openModal(item); renderDock(); });
    dockInner.appendChild(dockItem);
  });
}

function openModal(item){
  selectedItem = item;
  modalMedia.innerHTML = item.type === 'video'
    ? `<video src="${item.url}" controls autoplay playsinline></video>`
    : `<img src="${item.url}" alt="${item.title}">`;
  modalCaption.innerHTML = `<h3>${item.title}</h3><p>${item.desc}</p>`;
  modal.classList.add('open');
  renderDock();
}
function closeModal(){
  modal.classList.remove('open');
  selectedItem = null;
  renderDock();
}
modalClose.addEventListener('click', closeModal);
modal.addEventListener('click', (e) => { if(e.target === modal) closeModal(); });
document.addEventListener('keydown', (e) => { if(e.key === 'Escape') closeModal(); });

const videoObserver = new IntersectionObserver((entries) => {
  entries.forEach(entry => {
    const video = entry.target.querySelector('video');
    if(!video) return;
    if(entry.isIntersecting) video.play().catch(()=>{});
    else video.pause();
  });
}, {rootMargin:'50px',threshold:0.1});

function observeVideos(){
  document.querySelectorAll('.bento-item').forEach(item => {
    const video = item.querySelector('video');
    if(video) videoObserver.observe(item);
  });
}

// Drag reordering — uses real element geometry (not row/col math) so drop targets are always accurate
function startDrag(e, index, el){
  e.preventDefault();
  const clientX = e.touches ? e.touches[0].clientX : e.clientX;
  const clientY = e.touches ? e.touches[0].clientY : e.clientY;
  dragIndex = index;
  dragStartPos = {x:clientX, y:clientY};
  isDragging = false;
  currentDropIndex = null;
  let ghost = null;

  function findDropIndex(cx, cy){
    const nodes = Array.from(grid.children);
    for(let i = 0; i < nodes.length; i++){
      const r = nodes[i].getBoundingClientRect();
      if(cx >= r.left && cx <= r.right && cy >= r.top && cy <= r.bottom){
        return parseInt(nodes[i].dataset.index, 10);
      }
    }
    return null;
  }

  function clearDropHighlight(){
    grid.querySelectorAll('.drop-target').forEach(n => n.classList.remove('drop-target'));
  }

  const onMove = (ev) => {
    const cx = ev.touches ? ev.touches[0].clientX : ev.clientX;
    const cy = ev.touches ? ev.touches[0].clientY : ev.clientY;
    const dx = Math.abs(cx - dragStartPos.x);
    const dy = Math.abs(cy - dragStartPos.y);
    if(!isDragging && (dx > 8 || dy > 8)){
      isDragging = true;
      el.classList.add('dragging');
      ghost = createGhost(el, cx, cy);
    }
    if(isDragging){
      if(ev.cancelable) ev.preventDefault();
      moveGhost(ghost, cx, cy);
      clearDropHighlight();
      const idx = findDropIndex(cx, cy);
      currentDropIndex = idx;
      if(idx !== null && idx !== dragIndex){
        grid.children[idx].classList.add('drop-target');
      }
    }
  };

  const onEnd = (ev) => {
    document.removeEventListener('mousemove', onMove);
    document.removeEventListener('mouseup', onEnd);
    document.removeEventListener('touchmove', onMove);
    document.removeEventListener('touchend', onEnd);
    el.classList.remove('dragging');
    clearDropHighlight();
    removeGhost(ghost);

    if(isDragging && currentDropIndex !== null && currentDropIndex !== dragIndex){
      const moved = items[dragIndex];
      items.splice(dragIndex, 1);
      items.splice(currentDropIndex, 0, moved);
    }
    isDragging = false;
    dragIndex = null;
    currentDropIndex = null;
    renderGrid();
  };

  document.addEventListener('mousemove', onMove);
  document.addEventListener('mouseup', onEnd);
  document.addEventListener('touchmove', onMove, {passive:false});
  document.addEventListener('touchend', onEnd);
}

function createGhost(source, cx, cy){
  const g = source.cloneNode(true);
  g.className = 'drag-ghost';
  g.style.width = source.offsetWidth + 'px';
  g.style.height = source.offsetHeight + 'px';
  g.style.left = cx - source.offsetWidth/2 + 'px';
  g.style.top = cy - source.offsetHeight/2 + 'px';
  document.body.appendChild(g);
  return g;
}
function moveGhost(ghost, x, y){
  if(!ghost) return;
  ghost.style.left = x - ghost.offsetWidth/2 + 'px';
  ghost.style.top = y - ghost.offsetHeight/2 + 'px';
}
function removeGhost(ghost){ if(ghost) ghost.remove(); }

renderGrid();
window.addEventListener('resize', () => renderGrid());

const nav = document.getElementById('nav');
const navToggle = document.getElementById('navToggle');
window.addEventListener('scroll', () => {
  nav.classList.toggle('is-scrolled', window.scrollY > 40);
}, { passive: true });
navToggle.addEventListener('click', () => {
  navToggle.classList.toggle('active');
  const links = document.querySelector('.nav-links');
  links.classList.toggle('open');
});
</script>
